<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Three.js チュートリアル１</title>
<script src="three.min.js"></script>
<style type="text/css">
div#canvas-frame{
  border: none;
  cursor: pointer;
  width: 700px;
  height: 600px;
  background-color: #EEEEEE;
}
</style>
<script>
  var renderer;
  function initThree() {
    width = document.getElementById('canvas-frame').clientWidth;
    height = document.getElementById('canvas-frame').clientHeight;  
    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(width, height );
    document.getElementById('canvas-frame').appendChild(renderer.domElement);
    renderer.setClearColorHex(0x302833, 1.0);
  }
   
  var camera;
  function initCamera() {  
    camera = new THREE.PerspectiveCamera( 45 , width / height , 1 , 10000);
    camera.position.x = 70;
    camera.position.y = 70;
    camera.position.z = -30;
    camera.up.x = 0;
    camera.up.y = 0;
    camera.up.z = 1;
    camera.lookAt( {x:10, y:0, z:0 } );
  }
  var scene;
  function initScene() {    
    scene = new THREE.Scene();
  }
  var light,light2;
  function initLight() {  
    light = new THREE.SpotLight(0xFFFFFF, 600, 100,Math.PI/4, 0, 0.5);
    light.position.set( 60,30, 40 );
    light.lookAt(new THREE.Vector3(0,0,0));
    scene.add(light);
    light.castShadow = true;
    light2 = new THREE.HemisphereLight(0xffffff, 0x000000, 0.5);
    scene.add(light2);
  }

  var body, head, ear_right, ear_left, eye, eye2, nose, arm, arm2, leg, leg2, tail, heart, ring, wing_right1, wing_right2, wing_left1,wing_left2;
  var star = Array();
  
  function initObject(){   
  var points = [
  new THREE.Vector3(0,0,-54),
  new THREE.Vector3(20,0,-53),
  new THREE.Vector3(24,0,-50),
  new THREE.Vector3(25,0,-47),
  new THREE.Vector3(25,0,-45),
  new THREE.Vector3(24,0,-40),
  new THREE.Vector3(20,0,-25),
  new THREE.Vector3(19,0,-20), 
  new THREE.Vector3(17,0,-10),
  new THREE.Vector3(15,0,-8),
  new THREE.Vector3(11,0,-5),
  new THREE.Vector3(7,0,-3),
  new THREE.Vector3(2,0,-2.3),
  new THREE.Vector3(0.3,0,-2.2),
  new THREE.Vector3(0,0,-2)


];
//身体
body = new THREE.Mesh(                                        
     new THREE.LatheGeometry(points,1000,0, 2*Math.PI),
     new THREE.MeshPhongMaterial({                                      
               color: 0xf5f5f5
      }));

scene.add(body);

//頭
body.position.set( 0, 0, 0 );
head = new THREE.Mesh(
     new THREE.TorusGeometry(8, 15, 30, 16), 
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( head );
head.position.set( 0, 0, -25 );

//右耳
var points2 = [
  new THREE.Vector3(0,0,28),
  new THREE.Vector3(5,0,26),
  new THREE.Vector3(1,0,33),
  new THREE.Vector3(0,0,34) 
];

ear_right = new THREE.Mesh(
     new THREE.LatheGeometry(points2,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( ear_right );
ear_right.position.set( 10, -1, -34 );

//左耳 
var points3 = [
  new THREE.Vector3(0,0,28),
  new THREE.Vector3(5,0,27),
  new THREE.Vector3(1,0,33),
  new THREE.Vector3(0,0,34)  
];

ear_left = new THREE.Mesh(
     new THREE.LatheGeometry(points2,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( ear_left );
ear_left.position.set( -1, 10, -34 );

//目
eye = new THREE.Mesh(
     new THREE.RingGeometry(0.75,1.2,30,30,0, 0.9*Math.PI),
     new THREE.MeshBasicMaterial( { color: 0x2b2b2b } )
     );

scene.add( eye );
eye.position.set(11.3,15.3,-13);
eye.rotation.set( -Math.PI/2,Math.PI/4, 0);


eye2 = new THREE.Mesh(
     new THREE.RingGeometry(0.75,1.2,30,30,0.1*Math.PI, 0.9*Math.PI),
     new THREE.MeshBasicMaterial( { color: 0x2b2b2b } )
     );

scene.add( eye2 );
eye2.position.set(15.3,11.3,-13.2);
eye2.rotation.set( -Math.PI/2,Math.PI/4, 0 );

//鼻
var points4 = [
  new THREE.Vector3(0.2,0,0.8),
  new THREE.Vector3(0.5,0,0.6),
  new THREE.Vector3(0.7,0,0.3),
  new THREE.Vector3(0.6,0,0),
  new THREE.Vector3(0.4,0,-0.2)
];

nose = new THREE.Mesh(
     new THREE.LatheGeometry(points4,1000,0,2*Math.PI),
     new THREE.MeshBasicMaterial( { color: 0x2b2b2b } )
     );

scene.add( nose );
nose.position.set( 14.7,14.6,-16);

//腕 
var points5 = [
  new THREE.Vector3(0,0,6.1),
  new THREE.Vector3(1.3,0,6),
  new THREE.Vector3(1.8,0,5),
  new THREE.Vector3(2.3,0,3),
  new THREE.Vector3(2.3,0,0),
  new THREE.Vector3(1.8,0,-2),
  new THREE.Vector3(1.3,0,-3),
  new THREE.Vector3(0,0,-3.1),
];

arm = new THREE.Mesh(
     new THREE.LatheGeometry(points5,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( arm );
arm.position.set( 22.9,9,-31);
arm.rotation.set( Math.PI/1.8,-Math.PI/8, 0 );

arm2 = new THREE.Mesh(
     new THREE.LatheGeometry(points5,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( arm2 );
arm2.position.set( 11,21,-31);
arm2.rotation.set( 0,-Math.PI/1.8,0 );

//足   
var points6 = [
  new THREE.Vector3(0,0,10.8),
  new THREE.Vector3(1,0,10.5),
  new THREE.Vector3(3.2,0,10),
  new THREE.Vector3(3.2,0,1),
  new THREE.Vector3(3.2,0,-1),
  new THREE.Vector3(3.5,0,-2),
  new THREE.Vector3(3.9,0,-3),
  new THREE.Vector3(3.5,0,-4),
  new THREE.Vector3(1.4,0,-4.3),
  new THREE.Vector3(0.1,0,-4.7),
  new THREE.Vector3(0,0,-4.8)
];

leg = new THREE.Mesh(
     new THREE.LatheGeometry(points6,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( leg );
leg.position.set( 21,16.5,-47);
leg.rotation.set(Math.PI/3,-Math.PI/4, Math.PI/4  );


leg2 = new THREE.Mesh(
     new THREE.LatheGeometry(points6,1000,0,2*Math.PI),
     new THREE.MeshPhongMaterial( { color: 0xf5f5f5 } )
     );

scene.add( leg2 );
leg2.position.set( 16.3,20.7,-46.8);
leg2.rotation.set(Math.PI/3,-Math.PI/4, Math.PI/4  );

//尻尾
tail = new THREE.Mesh(
    new THREE.SphereGeometry(2, 30,30),
    new THREE.MeshPhongMaterial({color: 0xf5f5f5})
    );

scene.add(tail);
tail.position.set(-18,-18,-47);

//ハート
var shape = new THREE.Shape();
shape.moveTo(2.5*0.9, 2.5*0.9);
shape.bezierCurveTo(2.5*0.9, 2.5*0.9, 2*0.9, 0, 0, 0);
shape.bezierCurveTo(- 3*0.9, 0, - 3*0.9, 3.5*0.9, - 3*0.9, 3.5*0.9);
shape.bezierCurveTo(- 3*0.9, 5.5*0.9, - 1.5*0.9, 7.7*0.9, 2.5*0.9,9.5*0.9);
shape.bezierCurveTo(6*0.9, 7.7*0.9,  8*0.9,4.5*0.9, 8*0.9, 3.5*0.9);
shape.bezierCurveTo( 8*0.9, 3.5*0.9,8*0.9, 0, 5*0.9, 0);
shape.bezierCurveTo(3.5*0.9, 0, 2.5*0.9,2.5*0.9,2.5*0.9,2.5*0.9);

const extrudeSettings = {
  steps:  2,
  amount: 2,      
  bevelEnabled: true,
  bevelThickness: 1,
  bevelSize: 1, 
  bevelSegments: 2
 };

var heart_geometry = new THREE.ExtrudeGeometry(shape,extrudeSettings);
var heart_material = new THREE.MeshBasicMaterial( { color: 0xe6c0c0 } );
//var heart_material = new THREE.MeshBasicMaterial( { color: 0xfef4f4 } );   
heart = new THREE.Mesh(heart_geometry, heart_material);      

scene.add( heart );
heart.position.set( 16.3,17,-26);
heart.rotation.set(Math.PI/-2,Math.PI/4,0 );

//星
var r = 150;
for(var i=0; i<1000; i++){
  var size = Math.random()/3.5;
  var alpha_hour = (Math.random()*2400)%24;
  var alpha_minute = (Math.random()*600)%60;
  var alpha_second = ((Math.random()*6000000)%6000)*0.01;
  var sign = (Math.random()*11)%2;
  var dec_d  = (Math.random()*180)%90;
  var dec_minute = (Math.random()*6000)%60;
  var dec_second = ((Math.random()*6000000)%6000)*0.01;
  
  //赤経・赤緯を変換する
  var a_s = (alpha_hour + (alpha_minute + alpha_second/60)/60)* 15 * Math.PI/180;
  var f_s ;
  if (sign == 0){ f_s = -1; }else{ f_s = 1; }  
  var c_s = f_s *(dec_d +(dec_minute + dec_second/60)/60)*Math.PI/180;

  //xyz座標に変換する
  var px = r * Math.cos(a_s) * Math.cos(c_s);
  var py = r * Math.sin(a_s) * Math.cos(c_s);
  var pz = r * Math.sin(c_s);  
  var rgb_color = (Math.random()*20)%5;
  
  //alert(star_color);
  var star_color;
  if(rgb_color == 0){star_color = 0xffefe0 }
      else if (rgb_color == 1){star_color =0xffbcbc }
        else if (rgb_color == 2){star_color = 0xc1ffe0 }
          else if (rgb_color == 3){star_color = 0xffffc6 }
            else {star_color = 0xffffff }


star[i] = new THREE.Mesh(
    new THREE.SphereGeometry(size, 30,30),
    new THREE.MeshBasicMaterial({color: star_color, shiness:500})
    );
  scene.add(star[i]);
  star[i].position.set(px ,py ,pz-40 ); 

}

//輪
ring = new THREE.Mesh(
  new THREE.TorusGeometry(7.5,0.5,100,500),
  new THREE.MeshBasicMaterial({color: 0xfff462})
  );

scene.add(ring);
ring.position.set(0,0,220);
ring.rotation.set(Math.PI/30,0,0);

wing_right1 = new THREE.Mesh(
  new THREE.CylinderGeometry(5,5,1,30,30,false,0,1* Math.PI),
  new THREE.MeshBasicMaterial({color:0xabced8 })
  );

scene.add(wing_right1);
wing_right1.position.set(-23,11,220);
wing_right1.rotation.set(0,0, -Math.PI/4);

wing_right2 = new THREE.Mesh(
  new THREE.CylinderGeometry(5,5,1,30,30,false,0,1* Math.PI),
  new THREE.MeshBasicMaterial({color:0xabced8 })
  );

scene.add(wing_right2);
wing_right2.position.set(-25,13,223);
wing_right2.rotation.set(0,0, -Math.PI/4);

wing_left1 = new THREE.Mesh(
  new THREE.CylinderGeometry(5,5,1,30,30,false,0,1* Math.PI),
  new THREE.MeshBasicMaterial({color:0xabced8 })
  );

wing_left2 = new THREE.Mesh(
  new THREE.CylinderGeometry(5,5,1,30,30,false,0,1* Math.PI),
  new THREE.MeshBasicMaterial({color:0xabced8 })
  );

scene.add(wing_left1);
wing_left1.position.set(11,-23,220);
wing_left1.rotation.set(0,0, -Math.PI/4);

scene.add(wing_left2);
wing_left2.position.set(13,-25,223);
wing_left2.rotation.set(0,0, -Math.PI/4);


/*var axes = new THREE.AxisHelper(100);
            scene.add(axes); */
  }

/*var mouseX = 0;
  document.addEventListener('mousemove', event => {
  mouseX = event.pageX;
  });
*/

var rot2 = 0;
var count = 0 ;
  function tick2() {
    rot2 += 0.4; 
    // ラジアンに変換する
    const radian2 = (rot2 * Math.PI) / 180;
    // 角度に応じてカメラの位置を設定
    camera.position.x = -250 * Math.sin(radian2);
    camera.position.y = 250 * Math.cos(radian2);
  
    // 原点方向を見つめる
    camera.lookAt(new THREE.Vector3(0, 0, 0));
    
    light.position.x = -90 * Math.sin(radian2);
    light.position.y = 75 * Math.cos(radian2);
    
    heart.position.z += rot2*0.001;
    
    if (ring.position.z >4 && count == 0) ring.position.z += -0.11;
    if (wing_right1.position.z >-34 && count == 0) wing_right1.position.z += -0.09;
    if (wing_right2.position.z  > -31 && count == 0) wing_right2.position.z += -0.09;
    if (wing_left1.position.z > -34 && count == 0) wing_left1.position.z += -0.09;
    if (wing_left2.position.z > -31 && count == 0) {wing_left2.position.z += -0.09;
    }else if(count ==0){      
      eye.rotation.set( -Math.PI/2,Math.PI/4, Math.PI);
      eye.position.z = 16.3-30;
      eye2.rotation.set( -Math.PI/2,Math.PI/4, Math.PI);
      eye2.position.z = 16.3-30;
      count += 1;
    }
    if(count>0){
      body.position.z += 0.0001*rot2;
      head.position.z += 0.0001*rot2;
      ear_right.position.z += 0.0001*rot2;
      ear_left.position.z += 0.0001*rot2;
      eye.position.z += 0.0001*rot2;
      eye2.position.z += 0.0001*rot2;
      nose.position.z += 0.0001*rot2;
      arm.position.z += 0.0001*rot2;
      arm2.position.z += 0.0001*rot2;
      leg.position.z += 0.0001*rot2;
      leg2.position.z += 0.0001*rot2;
      tail.position.z += 0.0001*rot2;
      heart.position.z += 0.0001*rot2;
      ring.position.z += 0.0001*rot2;
      wing_right1.position.z += 0.0001*rot2;
      wing_right2.position.z += 0.0001*rot2;
      wing_left1.position.z += 0.0001*rot2;
      wing_left2.position.z += 0.0001*rot2;      
    }

    // レンダリング
    renderer.render(scene, camera);
    requestAnimationFrame(tick2);

  }
  
  function threeStart() {
    //alert("in");
    initThree();
    initCamera();
    initScene();    
    initLight();
    initObject();
    renderer.clear();    
    tick2();  
    //renderer.render(scene, camera);
  }
</script>
</head>
 
<body onload="threeStart();">
<div id="canvas-frame"></div>
</body>
</html>
